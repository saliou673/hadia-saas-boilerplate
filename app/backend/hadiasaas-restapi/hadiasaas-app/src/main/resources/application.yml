server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: Hadia SaaS REST API
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${POSTGRESQL_DATABASE_NAME}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        mime:
          charset: UTF-8
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:true}
          ssl:
            trust: ${SMTP_HOST}

springdoc:
  swagger-ui:
    path: /api/swagger-ui
    filter: true
  show-actuator: true
  api-docs:
    path: /api/docs
    version: openapi_3_1
    enabled: true
  packages-to-scan: com.hadiasaas.infrastructure.adapter.in.rest

# Custom properties
app:
  version: v1.0
  description: "Hadia SaaS REST API"
  web-app-origin: ${WEB_APP_ORIGIN:}
  security:
    authentication:
      jwt:
        base64-secret: ${JWT_SECRET}
        token-validity-in-seconds: ${DEFAULT_TOKEN_VALIDITY_IN_SECONDS:1800} # 30 minutes by default
        token-validity-in-seconds-for-remember-me: ${TOKEN_VALIDITY_IN_SECONDS_FOR_REMEMBER_ME:2592000} # 30 days by default
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
  default-user:
    create: true
    password: 12345678
  account:
    cleanup-cron: ${ACCOUNT_CLEANUP_CRON:0 0 1 * * ?}
    non-activated-user-retention-period: ${NON_ACTIVATED_USER_RETENTION_PERIOD:3d}
    soft-deleted-user-retention-period: ${SOFT_DELETED_USER_RETENTION_PERIOD:30d}
    reset-code-validity-period: ${RESET_CODE_VALIDITY_PERIOD:5m}
    managed-user-invitation-code-length: ${MANAGED_USER_INVITATION_CODE_LENGTH:8}
    managed-user-invitation-code-validity-period: ${MANAGED_USER_INVITATION_CODE_VALIDITY_PERIOD:1d}
  mail:
    from: ${NO_REPLY_EMAIL}
    routes:
      account-validation: account-validation
      reset-password: reset-password
      login: sign-in
      managed-user-invitation: ${MANAGED_USER_INVITATION_ROUTE:account/invitation}
  two-factor:
    code-validity-period: ${TWO_FACTOR_CODE_VALIDITY_PERIOD:5m}
    code-length: ${TWO_FACTOR_CODE_LENGTH:6}
    totp-issuer: ${TOTP_ISSUER:Hadia SaaS}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth:
      limit-for-period: ${RATE_LIMIT_AUTH_LIMIT:10}
      limit-refresh-period: ${RATE_LIMIT_AUTH_REFRESH_PERIOD:1m}
    api:
      limit-for-period: ${RATE_LIMIT_API_LIMIT:100}
      limit-refresh-period: ${RATE_LIMIT_API_REFRESH_PERIOD:1m}
  contact:
    recipient-emails: ${CONTACT_FORM_RECIPIENT_EMAILS}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    aws:
      bucket: ${AWS_STORAGE_BUCKET:}
      region: ${AWS_STORAGE_REGION:}
      endpoint: ${AWS_STORAGE_ENDPOINT:}
      path-style-access-enabled: ${AWS_STORAGE_PATH_STYLE_ACCESS_ENABLED:false}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <title th:text="#{email.email-change.title}">Email Address Change Verification</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="icon" th:href="${baseUrl + '/favicon.ico'}"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .otp-code {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 12px;
            color: #007bff;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #007bff;
        }

        .note {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
<p th:text="#{email.email-change.greeting(${firstName})}">Dear</p>
<p th:text="#{email.email-change.text1}">
    You requested to change your email address. Use the code below to confirm:
</p>
<div class="otp-code">
    <span th:text="${code}">000000</span>
</div>
<p class="note" th:text="#{email.email-change.note(${codeLifetimeAmount}, ${codeLifetimeUnit})}">
    This code will expire in 15 minutes. Do not share it with anyone.
</p>
<p>
    <span th:text="#{email.email-change.text2}">Regards,</span>
    <br/>
    <em th:text="#{email.signature}">The Hadia SaaS team.</em>
</p>
</body>
</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <title th:text="#{email.reset.title}">App password reset</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="icon" th:href="${baseUrl + '/favicon.ico'}"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .otp-code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #007bff;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #007bff;
        }

        .note {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
<p th:text="#{email.reset.greeting(${user.firstName})}">Dear</p>
<p th:text="#{email.reset.text1}">
    For your account a password reset was requested, please click on the URL below to reset it:
</p>
<div class="otp-code">
    <span th:text="${user.resetCode}">123456</span>
</div>
<p class="note" th:text="#{email.reset.note(${codeLifetimeAmount}, ${codeLifetimeUnit})}">This code will expire in 5
    minutes. Please enter it in the password reset form.</p>
<p>
    <span th:text="#{email.reset.text2}">Regards, </span>
    <br/>
    <em th:text="#{email.signature}">App.</em>
</p>
</body>
</html>

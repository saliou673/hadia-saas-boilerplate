<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <title th:text="#{email.subscription-payment-failed.title}">Hadia SaaS subscription payment failed</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .action-link {
            display: inline-block;
            background-color: #007bff;
            color: white !important;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: 500;
        }

        .note {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
<p th:text="#{email.subscription-payment-failed.greeting(${user.firstName})}">Dear</p>
<p th:text="#{email.subscription-payment-failed.text1(${planTitle})}">We were unable to complete the payment for your
    subscription.</p>
<p th:text="#{email.subscription-payment-failed.text2}">Please return to the application to review your payment method
    and try again.</p>
<p>
    <a class="action-link" th:href="${baseUrl}" th:text="#{email.subscription-payment-failed.action}">Open Maitrise
        TCF</a>
</p>
<p class="note" th:text="#{email.subscription-payment-failed.text3}">If you did not initiate this subscription, you can
    ignore this email.</p>
<p>
    <span th:text="#{email.deletion.text5}">Regards, </span>
    <br/>
    <em th:text="#{email.signature}">Hadia SaaS Team.</em>
</p>
</body>
</html>

services:
  db:
    image: postgres:18-alpine
    container_name: hadiasaas-db
    environment:
      POSTGRES_DB: hadiasaas-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - hadiasaas_pg_data:/var/lib/postgresql/data
    restart: always

  maildev:
    image: maildev/maildev:2.2.1
    container_name: hadiasaas-maildev
    ports:
      - "1025:1025" # SMTP
      - "1080:1080" # Web UI

volumes:
  hadiasaas_pg_data:
